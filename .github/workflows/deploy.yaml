name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web export
        run: npx expo export --platform web
      
      - name: Create 404.html for SPA routing
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script type="text/javascript">
                window.location.replace('/crunch-cart-magic/');
              </script>
            </head>
            <body></body>
          </html>
          EOF
          echo "✓ Created 404.html for SPA routing"
      
      - name: Verify dist folder
        run: |
          echo "Checking index.html paths:"
          grep -m 1 'crunch-cart-magic/_expo' dist/index.html && echo "✓ index.html has correct paths" || echo "ERROR: Paths not fixed"
          echo ""
          echo "Checking 404.html exists:"
          [ -f dist/404.html ] && echo "✓ 404.html exists" || echo "ERROR: 404.html missing"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
