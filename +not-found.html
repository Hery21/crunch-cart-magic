<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Crunch Cart Magic</title>
  <script type="text/javascript">
    // Redirect to hash-based routing if not already using it
    if (typeof window !== 'undefined') {
      const pathname = window.location.pathname;
      const hash = window.location.hash;
      const match = pathname.match(/^\/crunch-cart-magic(\/.*)?$/);
      
      if (match && (!hash || hash === '#')) {
        const pathSegment = match[1] || '/';
        const newUrl = '/crunch-cart-magic/#' + pathSegment;
        console.log('[URL Redirect] Converting:', pathname, '→', newUrl);
        window.history.replaceState({}, document.title, newUrl);
        // Force a reload to ensure React Router sees the new URL
        window.location.href = newUrl;
      }
    }
  </script>
  <style>
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      overflow: hidden;
    }
    #root {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/crunch-cart-magic/_expo/static/js/web/entry-658811390fbec130e9548a759b0bd5d9.js" defer></script>
</body>
